<div class="flex h-screen bg-gray-50 overflow-hidden font-sans relative">

  <button 
    (click)="toggleMobileMenu()"
    class="md:hidden absolute top-4 left-4 z-50 p-2 bg-white rounded-lg shadow-md text-gray-700 hover:text-blue-600 transition-colors">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
    </svg>
  </button>

  @if (isMobileMenuOpen) {
    <div 
      (click)="toggleMobileMenu()"
      class="md:hidden fixed inset-0 bg-black/40 z-30 transition-opacity">
    </div>
  }

  <div 
    [class.-translate-x-full]="!isMobileMenuOpen"
    [class.translate-x-0]="isMobileMenuOpen"
    class="fixed inset-y-0 left-0 z-40 w-64 transform transition-transform duration-300 ease-in-out md:relative md:translate-x-0 flex">
    
    <app-sidebar 
      (onMenuClick)="isMobileMenuOpen = false" 
      class="w-full h-full border-r bg-white shadow-sm flex flex-col">
    </app-sidebar>
    
  </div>

  <app-dashboard class="flex-1 flex flex-col overflow-hidden bg-gray-50/50 w-full"></app-dashboard>

</div>
