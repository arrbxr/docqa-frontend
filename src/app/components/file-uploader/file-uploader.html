<input type="file" #fileInput class="hidden" accept=".pdf,.txt,.docx" (change)="onFileSelected($event)">

<div class="w-full max-w-4xl mx-auto">
  
  <div class="grid grid-cols-3 gap-2 md:gap-4">
    
    @for (file of slots; track $index) {
      <div 
        (click)="!file ? triggerFileSelect($index) : null"
        [class.border-dashed]="!file"
        [class.border-gray-300]="!file"
        [class.hover:border-blue-500]="!file"
        [class.bg-white]="!file"
        [class.border-blue-500]="file"
        [class.bg-blue-50/40]="file"
        class="relative flex flex-col items-center justify-center p-2 md:p-6 rounded-xl border-2 transition-all min-h-[90px] md:min-h-[130px] cursor-pointer text-center">
        
        @if (file) {
          <div class="flex flex-col items-center w-full">
            <div class="p-1 md:p-2.5 bg-blue-100 text-blue-600 rounded-lg mb-1">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 md:h-6 md:w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z" />
              </svg>
            </div>
            <span class="text-[10px] md:text-sm font-semibold text-gray-700 truncate w-full px-1">{{ file.name }}</span>
            
            <button 
              (click)="removeFile($index, $event)"
              class="absolute top-1 right-1 p-0.5 rounded-full bg-gray-100 hover:bg-red-100 text-gray-400 hover:text-red-500 transition-colors">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 4.293z" clip-rule="evenodd" />
              </svg>
            </button>
          </div>
        } @else {
          <div class="flex flex-col items-center justify-center text-gray-400">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 md:h-7 md:w-7 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
            </svg>
            <span class="text-[10px] md:text-xs font-medium">Add File</span>
          </div>
        }

      </div>
    }

  </div>
</div>
