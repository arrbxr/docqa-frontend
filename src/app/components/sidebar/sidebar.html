<div class="flex flex-col h-full bg-gray-50/30 border-r border-gray-200">
  
  <div class="p-5 border-b border-gray-200 bg-white flex justify-center items-center">
    <h2 class="text-xl font-black text-gray-800 flex items-center gap-2 tracking-tight pl-6 md:pl-0">
      <span class="text-blue-600">⚡</span> DocQA
    </h2>
  </div>

  <div class="p-4 bg-white shadow-sm z-10 relative">
    <button 
      (click)="createNewWorkspace()"
      class="w-full flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-4 py-2.5 rounded-xl font-medium transition-all shadow-md hover:shadow-lg active:scale-[0.98]">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 flex-shrink-0" viewBox="0 0 20 20" fill="currentColor">
        <path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd" />
      </svg>
      <span class="whitespace-nowrap">New Workspace</span>
    </button>
  </div>

  <div class="flex-1 overflow-y-auto px-3 py-4">
    <h3 class="text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-3 px-2">Recent Chats</h3>
    
    <ul class="space-y-1.5">
      @for (ws of recentWorkspaces; track ws.workspaceId) {
        <li>
          <button 
            (click)="selectWorkspace(ws)" 
            class="w-full text-left px-3 py-2.5 rounded-lg text-gray-600 hover:bg-white hover:text-blue-600 hover:shadow-sm border border-transparent hover:border-gray-200 transition-all flex items-center gap-2.5 group">
            
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-gray-400 group-hover:text-blue-500 flex-shrink-0 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
            </svg>
            
            <span class="truncate text-sm font-medium w-full">{{ ws.name }}</span>
          </button>
        </li>
      } @empty {
        <div class="text-center mt-6 p-6 bg-white rounded-xl border border-dashed border-gray-300 mx-2 flex flex-col items-center gap-3 shadow-sm">
          <div class="p-3 bg-gray-50 rounded-full">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
            </svg>
          </div>
          <span class="text-xs text-gray-500 font-medium">No history found.<br>Create one to start!</span>
        </div>
      }
    </ul>
  </div>

</div>
